name: Fetch Data
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync-patrons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch and Format JSON
        run: |
          curl -s "https://cdn.fallensworkshop.com/bypass/872557386244698162/patrons" | jq . > PatreonData.json

      - name: Commit and Push (Overwrite History)
        run: |
          git config user.name "GitHub Action"
          git config user.email "GitHubAction@fallensworkshop.com"
          git add PatreonData.json
          git commit -m "Automated update: PatreonData.json" || exit 0
          git push
